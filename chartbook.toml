[config]
type = "pipeline"
chartbook_format_version = "0.0.2"

[site]
title = "News Headlines"
author = "Jeremiah Bejarano"
copyright = "2025"
logo_path = ""
favicon_path = ""

[pipeline]
id = "news_headlines"
pipeline_name = "News Headlines"
pipeline_description = "Curate news headlines data from various sources"
lead_pipeline_developer = "Jeremiah Bejarano"
contributors = ["Jeremiah Bejarano"]
software_modules_command = "module load anaconda3/3.11.4 TeXLive/2023"
runs_on_grid_or_windows_or_other = "Windows/Linux/MacOS"
git_repo_URL = ""
README_file_path = "./README.md"

[notebooks]


[notebooks.01_data_sources_overview]
notebook_name = "Data Sources Overview"
notebook_description = "Quick look at each raw dataset pulled by the pipeline."
notebook_path = "_output/01_data_sources_overview_ipynb.ipynb"

[notebooks.02_gdelt_sp500_filtering]
notebook_name = "GDELT S&P 500 Filtering"
notebook_description = "Analyze name matching between GDELT V2Organizations and S&P 500 companies, false positive detection, and comparison with RavenPack."
notebook_path = "_output/02_gdelt_sp500_filtering_ipynb.ipynb"

[notebooks.03_explore_merge_ravenpack_gdelt]
notebook_name = "Fuzzy Matching: RavenPack vs GDELT"
notebook_description = "Explore fuzzy matching between RavenPack and GDELT headlines using rapidfuzz."
notebook_path = "_output/03_explore_merge_ravenpack_gdelt_ipynb.ipynb"

[notebooks.04_gdelt_full_sample_analysis]
notebook_name = "GDELT Data Lake Analysis"
notebook_description = "Explore the full GDELT S&P 500 data lake: temporal coverage, company distribution, source diversity, and data quality."
notebook_path = "_output/04_gdelt_full_sample_analysis_ipynb.ipynb"

[notebooks.05_explore_newswire_data]
notebook_name = "Newswire Data Exploration"
notebook_description = "Explore raw newswire headlines and fuzzy-match against GDELT and RavenPack."
notebook_path = "_output/05_explore_newswire_data_ipynb.ipynb"




